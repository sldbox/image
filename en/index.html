<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLD Nexus</title>
    <style>
        /* =========================================================
           [0] 폰트 및 전역 CSS 변수
        ========================================================= */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --bg-base: #000000;
            --bg-panel: #0A0A0A;
            --bg-panel-hover: #141414;
            --accent: #38BDF8;
            --accent-glow: rgba(56,189,248,0.3);
            --text-main: #F8FAFC;
            --text-sub: #94A3B8;
            --text-muted: #52525B;
            --border-light: rgba(255,255,255,0.12);
            --tree-line: #27272A;
            --font: 'Pretendard', -apple-system, sans-serif;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-base); color: var(--text-main); font-family: var(--font); user-select: none; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; letter-spacing: -0.02em; }
        .container { width: 100%; max-width: 100%; padding: 20px 32px; box-sizing: border-box; display: flex; flex-direction: column; height: 100%; }

        /* =========================================================
           [1] 최상단 통합 글로벌 헤더 (검색 + 제목 + 버튼)
        ========================================================= */
        .global-unified-header {
            display: grid;
            grid-template-columns: 1.1fr 1.3fr 1.1fr;
            gap: 18px;
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 14px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 16px;
            flex-shrink: 0;
            width: 100%;
        }
        
        .global-unified-header .header-left { display: flex; align-items: center; width: 100%; padding: 0 18px; box-sizing: border-box; }
        .global-unified-header .header-center { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .global-unified-header .header-right { display: flex; justify-content: flex-end; align-items: center; width: 100%; padding: 0 18px; box-sizing: border-box; }

        /* 헤더 내 검색창 스타일 */
        .header-search-container { display: flex; gap: 10px; width: 100%; max-width: none; transition: opacity 0.3s ease; }
        .header-search-container .input-wrapper { flex: 1; position: relative; border-radius: 12px; background: var(--bg-base); border: 1px solid var(--border-light); transition: .3s; }
        .header-search-container .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .header-search-container .input-overlay-box { width: 100%; height: 48px; box-sizing: border-box; font-size: 1.15rem; font-weight: 700; padding: 0 16px; line-height: 48px; white-space: pre; overflow-x: auto; overflow-y: hidden; border: none; background: transparent; scrollbar-width: none; color: var(--text-main); font-family: var(--font); }
        #highlightLayer { position: absolute; top: 0; left: 0; z-index: 1; color: var(--text-main); pointer-events: none; }
        #comboInput { position: absolute; top: 0; left: 0; z-index: 2; color: transparent; caret-color: var(--accent); outline: none; }
        #comboInput::placeholder { color: var(--text-muted); font-weight: 600; font-size: 1rem; }
        .header-search-container .btn-reset { background: rgba(255,255,255,.05); color: var(--text-main); border: 1px solid var(--border-light); border-radius: 12px; padding: 0 20px; font-size: 0.95rem; cursor: pointer; font-weight: bold; transition: .2s; height: 48px; white-space: nowrap; }
        .header-search-container .btn-reset:hover { background: rgba(255,99,132,.1); color: #FF6B6B; border-color: #FF6B6B; }

        /* 타이틀 및 우측 버튼 */
        .main-title { color: transparent; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; background-clip: text; font-size: 1.45rem; font-weight: 800; margin-bottom: 2px; line-height: 1.2; }
        .creator-info { font-size: 0.8rem; color: var(--text-sub); margin: 0; }
        .btn-toggle-view { background: linear-gradient(180deg, var(--accent), #0284C7); color: #fff; border: none; border-radius: 50px; padding: 10px 26px; font-size: 0.95rem; cursor: pointer; font-weight: 700; transition: all .3s; box-shadow: 0 4px 15px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.3); font-family: var(--font); white-space: nowrap; }
        .btn-toggle-view:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }

        /* =========================================================
           [2] 뷰 레이아웃
        ========================================================= */
        .view-section { display: none; width: 100%; flex: 1; min-height: 0; animation: fadeIn .4s ease forwards; }
        .view-section.active { display: grid; grid-template-columns: 1.1fr 1.3fr 1.1fr; gap: 18px; }
        #view-essence.active { display: grid; grid-template-columns: 1.3fr 1.1fr; gap: 18px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }

        .panel-col { display: flex; flex-direction: column; height: 100%; min-height: 0; }
        .card-panel { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 18px; padding: 18px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; height: 100%; min-height: 0; }

        /* =========================================================
           [3] 빠른 검색 및 매직 코스트 (좌측 레이어)
        ========================================================= */
        .quick-tools-panel { border-bottom: 1px solid var(--border-light); padding-bottom: 16px; margin-bottom: 16px; flex-shrink: 0; }
        .quick-tools-header { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: var(--text-sub); }
        .grade-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .grade-btn { background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 9px; color: var(--text-sub); font-size: 1.15rem; font-weight: bold; padding: 16px 0; cursor: pointer; transition: .2s; text-align: center; }
        .grade-btn:hover { background: var(--bg-panel-hover); color: var(--text-main); border-color: var(--text-muted); transform: translateY(-2px); }

        .magic-dashboard-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .magic-dashboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; flex: 1; }
        .cost-slot { background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 16px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; transition: all .3s ease; }
        .cost-slot.active { background: rgba(56,189,248,.05); border-color: var(--accent); box-shadow: inset 0 0 20px var(--accent-glow); }
        .cost-slot.active .slot-val { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
        .slot-val { font-size: 2rem; font-weight: 900; color: var(--text-sub); line-height: 1.1; transition: color .3s; }
        .slot-name { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-top: 5px; }

        /* =========================================================
           [4] 중앙 계보 트리 레이어
        ========================================================= */
        .tree-scroll-container { flex: 1; overflow-y: auto; height: 0; padding-right: 4px; }
        .analysis-card { background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 14px; padding: 15px 19px; margin-bottom: 14px; }
        .analysis-card h3 { margin: 0 0 14px 0; font-size: 1.05rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 11px; }
        .tree-btn { background: transparent; color: var(--text-sub); border: 1px solid var(--border-light); border-radius: 6px; padding: 4px 12px; font-size: 0.8rem; cursor: pointer; font-weight: 600; transition: .2s; }
        .tree-btn:hover { background: var(--text-sub); color: var(--bg-base); }
        
        .tree-ul { list-style: none; padding-left: 24px; margin: 8px 0 0 0; border-left: 2px solid var(--tree-line); display: block; }
        .tree-ul.root-ul { border-left: none; margin-left: 0; padding-left: 0; }
        .tree-li { position: relative; margin: 11px 0 0 0; }
        .tree-li::before { content: ""; position: absolute; top: 14px; left: -24px; width: 18px; height: 2px; background: var(--tree-line); border-radius: 2px; }
        .tree-node-wrapper { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        
        .unit-badge { display: inline-flex; align-items: center; background: var(--bg-panel-hover); border: 1px solid var(--border-light); border-radius: 8px; padding: 6px 13px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: .2s; box-shadow: 0 2px 5px rgba(0,0,0,.5); white-space: nowrap; }
        .unit-badge:hover { filter: brightness(1.2); transform: translateX(2px); }
        .toggle-mark { margin-left: 8px; font-size: 0.65rem; color: var(--text-muted); }
        .bullet-recipe { color: var(--text-sub); font-size: 0.85rem; margin: 6px 0 0 4px; padding-left: 9px; font-weight: 500; }
        .bullet-cost { color: var(--accent); font-size: 0.85rem; margin: 4px 0 0 4px; padding-left: 9px; font-weight: 700; }

        /* =========================================================
           [5] 우측 도감 탭 및 카드 UI
        ========================================================= */
        #tablesContainer { display: flex; flex-direction: column; height: 100%; min-height: 0; }
        
        .tabs-wrapper { display: flex; background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 12px; padding: 4px; margin-bottom: 14px; flex-shrink: 0; justify-content: space-around; }
        .tab-btn { flex: 1; background: transparent; border: none; border-radius: 8px; padding: 12px 0; color: var(--text-muted); font-weight: 700; cursor: pointer; font-size: 1rem; transition: .3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--accent); }
        .tab-btn .unit-count { font-size: 0.85rem; font-weight: 500; margin-top: 4px; color: inherit; opacity: 0.8; }
        
        .tab-content-area { flex: 1; overflow-y: auto; height: 0; padding-right: 4px; }
        
        .unit-list-card { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-light); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .unit-list-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-1px); }
        .unit-list-name { flex: 0 0 40%; font-weight: 800; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
        .unit-list-recipe { flex: 1; font-size: 0.85rem; color: var(--text-sub); line-height: 1.5; word-break: keep-all; }

        /* =========================================================
           [6] 일일정수 UI
        ========================================================= */
        .essence-left-col { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-right: 4px; }
        .essence-right-col { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 20px; padding: 22px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
        
        .essence-top-banner { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 20px; padding: 32px 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,.8); flex-shrink: 0; width: 100%; }
        .essence-score-master { display: flex; align-items: center; justify-content: center; width: 100%; flex-wrap: wrap; gap: 40px; }
        .essence-score-left-wrap { display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; }
        
        .score-circle { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); border: 2px dashed var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 25px var(--accent-glow); flex-shrink: 0; }
        .score-circle span { font-size: 3.5rem; font-weight: 900; color: var(--text-main); line-height: 1; }
        .score-circle label { font-size: 0.85rem; color: var(--accent); font-weight: 800; margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; }
        
        .essence-sub-scores { display: flex; gap: 18px; align-items: center; }
        .sub-score-card { background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 16px; width: 140px; height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .sub-score-card .title { font-size: 0.9rem; color: var(--text-sub); font-weight: 800; margin-bottom: 6px; }
        .sub-score-card .value { font-size: 2.2rem; font-weight: 900; line-height: 1; }
        .sub-score-card .max { font-size: 1rem; color: var(--text-muted); font-weight: 600; }
        
        .btn-reset-essence { background: rgba(255,99,132,.08); color: #FF6B6B; border: 1px solid rgba(255,99,132,.3); border-radius: 16px; padding: 0 28px; height: 140px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: .2s; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        .btn-reset-essence:hover { background: rgba(255,99,132,.2); }
        
        .essence-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; align-items: start; }
        .essence-group { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: 18px; padding: 20px; width: 100%; box-sizing: border-box; }
        .essence-group-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 12px; margin-bottom: 10px; }
        .essence-group-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; }
        
        .es-grade-header { font-size: 0.8rem; font-weight: 800; padding: 8px 4px 5px 2px; margin-top: 12px; border-bottom: 1px solid; }
        .btn-select-all { background: transparent; color: var(--text-sub); border: 1px solid var(--border-light); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: .2s; }
        .btn-select-all:hover { color: var(--text-main); background: var(--bg-panel-hover); }
        .unit-check-list { display: flex; flex-direction: column; gap: 8px; }
        .unit-check-btn { background: var(--bg-base); border: 1px solid var(--border-light); border-radius: 10px; padding: 11px 15px; cursor: pointer; font-size: 0.95rem; font-weight: 700; color: var(--text-sub); transition: all .2s; display: flex; align-items: center; gap: 12px; }
        .unit-check-btn::before { content: ''; display: block; width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--text-muted); transition: .2s; background: var(--bg-panel); flex-shrink: 0; }
        .unit-check-btn:hover { background: var(--bg-panel-hover); color: var(--text-main); }
        .unit-check-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--text-main); }
        .unit-check-btn.active::before { background: var(--accent); border-color: var(--accent); box-shadow: inset 0 0 0 2px var(--bg-panel); }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* =========================================================
           [7] 반응형 모바일 (미디어 쿼리)
        ========================================================= */
        @media(max-width:1400px){
            .essence-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media(max-width:1200px){
            body { height: auto; overflow: visible; }
            .container { padding: 12px; height: auto; }
            
            .global-unified-header { display: flex; flex-direction: column; gap: 16px; padding: 16px; }
            .global-unified-header .header-left, .global-unified-header .header-right { width: 100%; justify-content: center; padding: 0; }

            .view-section.active, #view-essence.active { display: flex; flex-direction: column; gap: 16px; height: auto; }
            .panel-col { height: auto; flex: none; }
            .card-panel { height: auto; }
            #view-combo .card-panel:nth-child(2) { height: 500px; flex: none; }
            .essence-left-col { overflow: visible; padding-right: 0; }
            .essence-right-col { height: 500px; flex: none; }
            .magic-dashboard { grid-template-columns: repeat(5, 1fr) !important; }
        }
        @media(max-width:768px){
            .essence-grid { grid-template-columns: 1fr; }
            .essence-score-master, .essence-score-left-wrap { flex-direction: column; gap: 20px; align-items: center; }
            .essence-sub-scores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
            .sub-score-card, .btn-reset-essence { width: 100%; height: 100px; }
            .score-circle { width: 120px; height: 120px; }
            .btn-reset-essence { padding: 0; }
        }
    </style>
</head>
<body oncontextmenu="return false">
<div class="container">

    <!-- [최상단 통합 글로벌 헤더] -->
    <div class="global-unified-header">
        <div class="header-left">
            <div class="header-search-container" id="header-search-block">
                <div class="input-wrapper">
                    <input type="text" id="comboInput" class="input-overlay-box" placeholder="Unit*Qty (e.g. Tychus*8)" autocomplete="off" spellcheck="false">
                    <div id="highlightLayer" class="input-overlay-box"></div>
                </div>
                <button class="btn-reset" onclick="resetCombo()">Reset</button>
            </div>
        </div>
        <div class="header-center">
            <h1 class="main-title">SLD Nexus</h1>
            <p class="creator-info">Creator Hoe-jang | Handle 3-S2-1-2461127</p>
        </div>
        <div class="header-right">
            <button id="btn-toggle-view" class="btn-toggle-view" onclick="toggleMainView()">Switch to Daily Essence</button>
        </div>
    </div>

    <!-- ===== 히든 조합 뷰 ===== -->
    <div id="view-combo" class="view-section active">
        <!-- 1. 왼쪽 빠른검색 / 대시보드 레이어 -->
        <div class="panel-col">
            <div class="card-panel" style="flex:1; display:flex; flex-direction:column;">
                
                <div class="quick-tools-panel">
                    <div class="quick-tools-header">Quick Grade Search Filter</div>
                    <div class="grade-buttons" id="quickGradeButtons"></div>
                </div>
                
                <div class="magic-dashboard-container">
                    <div class="magic-dashboard" id="magicDashboard"></div>
                </div>
            </div>
        </div>
        
        <!-- 2. 중앙 계보 트리 레이어 -->
        <div class="card-panel" id="treeScrollPanel">
            <div id="treeView" class="tree-scroll-container">
                <div style="color:var(--text-muted);text-align:center;margin-top:80px;font-size:1rem;font-weight:600;">If you search/select a unit on the left or right,<br>the lineage will be displayed here.</div>
            </div>
        </div>
        
        <!-- 3. 우측 도감 카드 레이어 -->
        <div class="card-panel">
            <div id="tablesContainer"></div>
        </div>
    </div>

    <!-- ===== 일일 정수 뷰 ===== -->
    <div id="view-essence" class="view-section">
        <div class="essence-left-col">
            <div class="essence-top-banner">
                <div class="essence-score-master">
                    <div class="essence-score-left-wrap">
                        <div class="score-circle">
                            <span id="essence-total-val">0</span>
                            <label>Total</label>
                        </div>
                        <div class="essence-sub-scores">
                            <div class="sub-score-card">
                                <div class="title">Korhal's Essence</div>
                                <div><span class="value" id="val-coral">0</span><span class="max" id="max-coral">/0</span></div>
                            </div>
                            <div class="sub-score-card">
                                <div class="title">Aiur's Essence</div>
                                <div><span class="value" id="val-aiur">0</span><span class="max" id="max-aiur">/0</span></div>
                            </div>
                            <div class="sub-score-card">
                                <div class="title">Zerus's Essence</div>
                                <div><span class="value" id="val-zerus">0</span><span class="max" id="max-zerus">/0</span></div>
                            </div>
                        </div>
                    </div>
                    <button class="btn-reset-essence" onclick="resetAllEssence()">Reset (Deselect All)</button>
                </div>
            </div>
            <div class="essence-grid" id="essenceGroupsContainer"></div>
        </div>
        
        <div class="essence-right-col">
            <div id="essenceTreeView" class="tree-scroll-container">
                <div style="color:var(--text-muted);text-align:center;margin-top:80px;font-size:1rem;font-weight:600;">If you click a unit on the left,<br>its entire lineage will be displayed.</div>
            </div>
        </div>
    </div>
</div>

<script>
/* ========================================================================
   [ DB ] 데이터베이스 및 설정
======================================================================== */
const raceColors = {
    "Magic":"#ffffff","T-Bio":"#4ea8de","T-Mech":"#e07a5f",
    "P-Bio":"#f4d03f","P-Mech":"#48c9b0","Zerg/Neutral":"#af7ac5","Hybrid":"#f39c12"
};

const gradeColors = {
    "Magic":"#87ceeb","Rare":"#ffff00","Epic":"#ff8c00","Unique":"#ff0000",
    "Hell":"#ff69b4","Legend":"#A78BFA","Hidden":"#58d68d","Super Hidden":"#ffd700"
};

const GRADE_ORDER = ["Magic","Rare","Epic","Unique","Hell","Legend","Hidden","Super Hidden"];

const IGNORE_PARSE_RECIPES = [
    "Undiscovered",
    "None",
    "",
    "Zerg Up 20+ before Round 100 [(Other Race Up 0)[1], Reversal Lottery 10 times[1], Life Lottery 3 times-Summon[1]]"
];

const specialKeywordMap = [
    {keys:["Auto Turret"],atom:"Auto Turret"},
    {keys:["Burrow"],atom:"Burrow"},
    {keys:["Mine","Vulture"],atom:"Widow Mine",divider:12},
    {keys:["Yeti(F)","YetiF"],atom:"Yeti(F)"},
    {keys:["Yeti(M)","YetiM"],atom:"Yeti(M)"},
    {keys:["Massive","Disaster"],atom:"GOT/Massive",subKey:"Massive"},
    {keys:["God of Time","GOT"],atom:"GOT/Massive",subKey:"GOT"}
];

/* ========================================================================
   [ 로직 ] 코스트 계산
======================================================================== */
function processCostKeyword(rawName, amount, map){
    let matched = false;
    const cName = clean(rawName);
    for(const conf of specialKeywordMap){
        if(conf.keys.some(k => cName.includes(clean(k)))){
            const val = conf.divider ? amount/conf.divider : amount;
            if(conf.subKey){ if(!map[conf.atom]) map[conf.atom]={GOT:0,Massive:0}; map[conf.atom][conf.subKey]+=val; }
            else { map[conf.atom]=(map[conf.atom]||0)+val; }
            matched=true; break;
        }
    }
    if(!matched){
        const atom = dashboardAtoms.find(a=>clean(a.name)===cName);
        if(atom){ map[atom.name]=(map[atom.name]||0)+amount; matched=true; }
    }
    return matched;
}

function parseFixedCost(costStr, multiplier, map){
    if(!costStr||["Insufficient Info","Undiscovered","None",""].includes(costStr)) return;
    costStr.split(',').forEach(p=>{
        const m = p.match(/(.+?)\[(\d+(?:\.\d+)?)\]/);
        if(m){ processCostKeyword(m[1].trim(), parseFloat(m[2])*multiplier, map); }
        else { processCostKeyword(p.trim(), multiplier, map); }
    });
}

function calculateRecursiveCost(name, m, map, visited=new Set()){
    const pName = clean(name.split(/[(\[]/)[0]);
    if(visited.has(pName)) return;
    const curV=new Set(visited); curV.add(pName);
    if(processCostKeyword(pName, m, map)) return;
    
    const u = unitMap.get(pName);
    
    // IGNORE_PARSE_RECIPES 차단
    if(u && u.recipe && !IGNORE_PARSE_RECIPES.includes(u.recipe)){
        u.recipe.split(/\+(?![^()]*\))/).forEach(part=>{
            const match=part.trim().match(/^([^(\[]+)/);
            if(match){
                const ingName=match[1].trim();
                const cntMatch=part.match(/\[(\d+)\]/);
                const cnt=cntMatch?parseInt(cntMatch[1]):1;
                const childU = unitMap.get(clean(ingName));
                if(childU && childU.cost && !["Insufficient Info","Undiscovered","None",""].includes(childU.cost)){
                    parseFixedCost(childU.cost, cnt*m, map);
                } else {
                    calculateRecursiveCost(ingName, cnt*m, map, curV);
                }
            } else {
                calculateRecursiveCost(part.trim(), m, map, curV);
            }
        });
    }
}

/* ========================================================================
   [ 계보 트리 렌더링 ] 
======================================================================== */
function buildTree(key, visited=new Set(), isRoot=false, conditionStr='', depth=0){
    const u = unitMap.get(key);
    if(!u) return `<li class="tree-li"><div class="tree-node-wrapper"><div class="unit-badge">${key}</div><span style="color:var(--text-sub);font-size:0.8rem;font-weight:600;">${conditionStr}</span></div></li>`;
    
    if(visited.has(key)) return `<li class="tree-li"><div class="tree-node-wrapper"><div class="unit-badge" style="color:var(--text-muted);background:var(--bg-base);">${u.name} (Duplicate)</div><span style="color:var(--text-sub);font-size:0.8rem;font-weight:600;">${conditionStr}</span></div></li>`;
    
    const newV=new Set(visited); newV.add(key);
    let ch='';
    
    // IGNORE_PARSE_RECIPES에 해당하는 경우 하위 트리 탐색을 건너뜀
    if(u.recipe && !IGNORE_PARSE_RECIPES.includes(u.recipe)){
        u.recipe.split(/\+(?![^()]*\))/).forEach(part=>{
            const match = part.trim().match(/^([^(\[]+)(?:\(([^)]+)\))?(?:\[(\d+)\])?/);
            if(match) {
                const childName = clean(match[1]);
                const cond = match[2] ? `(${match[2]})` : '';
                const cnt = match[3] ? `[${match[3]}]` : '';
                const combinedCond = `${cond}${cnt}`;

                const target=unitMap.get(childName);
                if(target && target.key!==u.key) {
                    ch+=buildTree(target.key||childName, newV, false, combinedCond, depth+1);
                } else {
                    ch+=`<li class="tree-li"><div class="tree-node-wrapper"><div class="unit-badge" style="color:var(--text-muted);">${match[1].trim()}</div><span style="color:var(--text-sub);font-size:0.85rem;font-weight:600;">${combinedCond}</span></div></li>`;
                }
            } else {
                const childName=clean(part);
                const target=unitMap.get(childName);
                if(target && target.key!==u.key) ch+=buildTree(target.key||childName, newV, false, '', depth+1);
            }
        });
    }
    
    const ulStyle = depth === 0 ? 'block' : 'none'; 
    const mark = depth === 0 ? '▼' : '▶'; 
    const bulletDisplay = depth === 0 ? 'block' : 'none';
    const isRedundant = u.recipe && u.cost && clean(u.recipe).replace(/\+/g,',')===clean(u.cost).replace(/\+/g,',');
    
    return `<li class="tree-li">
        <div class="tree-node-wrapper">
            <div class="unit-badge" style="color:${getUnitColor(u.name)};" onclick="toggleTreeNode(this)">
                ${u.name}${ch?`<span class="toggle-mark">${mark}</span>`:''}
            </div>
            ${conditionStr ? `<span style="color:var(--text-sub);font-size:0.85rem;font-weight:600;">${conditionStr}</span>` : ''}
        </div>
        ${(u.recipe && !["Undiscovered","None",""].includes(u.recipe)) ? `<div class="bullet-recipe" style="display:${bulletDisplay};">Materials: ${u.recipe}</div>`:''}
        ${(u.cost&&!isRedundant&&!["Undiscovered","None",""].includes(u.cost))?`<div class="bullet-cost" style="display:${bulletDisplay};">Magic: ${u.cost}</div>`:''}
        ${ch?`<ul class="tree-ul ${isRoot ? 'root-ul' : ''}" style="display:${ulStyle};">${ch}</ul>`:''}
    </li>`;
}

function toggleAllTree(btn) {
    const card = btn.closest('.analysis-card');
    let isExpanded = btn.getAttribute('data-expanded') === 'true';

    if (isExpanded) {
        const rootNode = card.querySelector('.tree-ul.root-ul > .tree-li');
        if (rootNode) {
            const firstLevelUl = rootNode.querySelector(':scope > .tree-ul');
            if (firstLevelUl) {
                firstLevelUl.querySelectorAll('.tree-ul').forEach(el => el.style.display = 'none');
                firstLevelUl.querySelectorAll('.bullet-recipe, .bullet-cost').forEach(el => el.style.display = 'none');
                firstLevelUl.querySelectorAll('.toggle-mark').forEach(el => el.innerText = '▶');
            }
        }
        btn.innerText = 'Expand All';
    } else {
        card.querySelectorAll('.tree-ul').forEach(el => el.style.display = 'block');
        card.querySelectorAll('.bullet-recipe, .bullet-cost').forEach(el => el.style.display = 'block');
        card.querySelectorAll('.toggle-mark').forEach(el => el.innerText = '▼');
        btn.innerText = 'Collapse All';
    }
    btn.setAttribute('data-expanded', !isExpanded);
}

function toggleTreeNode(el){
    const p=el.closest('.tree-li');
    const r=p.querySelector(':scope>.bullet-recipe');
    const c=p.querySelector(':scope>.bullet-cost');
    const t=p.querySelector(':scope>.tree-ul');
    const m=p.querySelector(':scope>.tree-node-wrapper .toggle-mark');
    if(t) t.style.display=(t.style.display==='none'?'block':'none');
    if(r) r.style.display=(r.style.display==='none'?'block':'none');
    if(c) c.style.display=(c.style.display==='none'?'block':'none');
    if(m) m.innerText=(m.innerText==='▶'?'▼':'▶');
}

const DOM = {};
let currentView = 1;

function analyzeUnits(keys, mults={}, targetContainer = null){
    const isMainView = !targetContainer || targetContainer.id === 'treeView';
    if(!targetContainer) targetContainer = DOM.treeView;

    if(isMainView) resetMagicDashboard(false);
    
    const totalMap={};
    dashboardAtoms.forEach(a=>{
        if(a.name==="GOT/Massive") totalMap[a.name]={GOT:0,Massive:0};
        else totalMap[a.name]=0;
    });
    
    let htmlBuffer = ''; 
    
    if(keys.length===1 && isMainView){
        const targetU = unitMap.get(keys[0]);
        if(targetU && (targetU.grade==="Legend"||targetU.grade==="Hidden"||targetU.grade==="Hell"||targetU.grade==="Super Hidden")){
            const parents = unitDatabase.filter(u=>{
                const isHigher = ["Hidden","Super Hidden"].includes(u.grade);
                return isHigher && u.name!==targetU.name && u.recipe && u.recipe.includes(targetU.name);
            });
            if(parents.length>0){
                parents.sort((a,b)=>GRADE_ORDER.indexOf(a.grade)-GRADE_ORDER.indexOf(b.grade));
                htmlBuffer += `<div class="analysis-card" style="border-color:var(--accent);background:rgba(56,189,248,.05);">
                    <h3 style="color:var(--accent);border-bottom-color:rgba(56,189,248,.2);">[!] Possible Higher Combinations (Lineage)</h3>
                    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;">`;
                parents.forEach(p=>{
                    htmlBuffer += `<div class="unit-badge" style="color:${getUnitColor(p.name)};border-color:rgba(255,255,255,.1);" onclick="selectUnitFromAction('${p.name}')">${p.name}</div>`;
                });
                htmlBuffer += `</div></div>`;
            }
        }
    }
    
    keys.forEach((k)=>{
        const u=unitMap.get(k); if(!u) return;
        const c=mults[k]||1;
        
        if(u.cost && !["Insufficient Info","Undiscovered","None",""].includes(u.cost)){
            parseFixedCost(u.cost, c, totalMap);
        } else {
            calculateRecursiveCost(u.name, c, totalMap);
        }
        
        htmlBuffer += `<div class="analysis-card" id="card-${k}">
            <h3>
                <span style="color:${getUnitColor(u.name)};text-shadow:0 0 10px rgba(255,255,255,.1);">${u.name}${c>1?` <span style="color:var(--text-muted);font-size:.9rem;">x${c}</span>`:''}</span>
                <button class="tree-btn" data-expanded="false" onclick="toggleAllTree(this)">Expand All</button>
            </h3>
            <div class="lazy-tree-container" style="display:block;">
                <ul class="tree-ul root-ul" style="display:block;">${buildTree(k, new Set(), true, '', 0)}</ul>
            </div>
        </div>`;
    });
    
    targetContainer.innerHTML = htmlBuffer;
    
    if(isMainView) {
        dashboardAtoms.forEach(a=>{
            const val=totalMap[a.name];
            const e=document.getElementById(`val-${a.name}`);
            const container=document.getElementById(`val-container-${a.name}`);
            const nameEl=container.querySelector('.slot-name');
            if(a.name==="GOT/Massive"){
                if(val.GOT>0||val.Massive>0){
                    let html="";
                    if(val.GOT>0) html+=`<div style="font-size:.9rem;line-height:1.2;color:#F59E0B;">GOT ${Math.ceil(val.GOT)}</div>`;
                    if(val.Massive>0) html+=`<div style="font-size:.9rem;line-height:1.2;color:#EF4444;margin-top:2px;">Massive ${Math.ceil(val.Massive)}</div>`;
                    e.innerHTML=html; if(nameEl) nameEl.style.display='none'; container.classList.add('active');
                }
            } else if(val>0){
                e.innerText=Math.ceil(val); if(nameEl) nameEl.style.display='block'; container.classList.add('active');
            }
        });
    }
}

/* ========================================================================

======================================================================== */
function updateHighlight(){
    const val=DOM.comboInput.value;
    if(!val){DOM.highlightLayer.innerHTML="";return;}
    const safeVal=val.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const parts=safeVal.split(/([,\/]+)/);
    const coloredParts=parts.map(part=>{
        if(/^[,\/]+$/.test(part)) return `<span style="color:var(--text-muted)">${part}</span>`;
        const subParts=part.split('*'); let unitName=subParts[0]; let color="var(--text-main)";
        if(unitName.trim().length>0){
            const found=findUnit(clean(unitName));
            if(found) color=getUnitColor(found.name);
        }
        subParts[0]=`<span style="color:${color}">${unitName}</span>`;
        return subParts.join('<span style="color:var(--text-muted)">*</span>');
    });
    DOM.highlightLayer.innerHTML=coloredParts.join('');
}

function findUnit(ckey){
    const aliases={"Amon":"Amon","Xel'Naga Kerrigan":"Xel'Naga Kerrigan","Nova":"Nova","Spear of Adun":"Spear of Adun","Narud":"Narud","Overmind":"Overmind"};
    const searchKey=aliases[ckey]?clean(aliases[ckey]):ckey;
    return unitMap.get(searchKey) || [...unitMap.values()].find(u=>u.key===searchKey||clean(u.name)===searchKey);
}

const debounceSearch = debounce(()=>{
    const val=clean(DOM.comboInput.value);
    resetMagicDashboard(false); DOM.treeView.innerHTML=""; 
    if(!val) return;
    
    const terms=val.split(/[,\/]/).map(t=>t.trim()).filter(t=>t!=="");
    const multMap={}; const exacts=[];
    const aliases={"Amon":"Amon","Xel'Naga Kerrigan":"Xel'Naga Kerrigan","Nova":"Nova","Spear of Adun":"Spear of Adun","Narud":"Narud","Overmind":"Overmind"};
    terms.forEach(raw=>{
        let [t,c]=raw.split('*'); let p=clean(t);
        let searchKey=aliases[p]?clean(aliases[p]):p;
        let found=unitMap.get(searchKey)||[...unitMap.values()].find(u=>clean(u.name)===searchKey);
        if(found){ exacts.push(clean(found.name)); multMap[clean(found.name)]=parseInt(c)||1; }
    });
    
    if(exacts.length) analyzeUnits(exacts, multMap);
}, 400);

function selectUnitFromAction(name){
    DOM.comboInput.value=name; updateHighlight();
    DOM.treeView.innerHTML="";
    
    analyzeUnits([clean(name)]);
    
    if(window.innerWidth<=1200) document.getElementById('treeScrollPanel').scrollIntoView({behavior:'smooth'});
    else DOM.treeView.scrollTop=0;
}

}

function selectTab(idx){
    document.querySelectorAll('.tab-btn').forEach((btn,i)=>{
        if(i===idx) btn.classList.add('active'); else btn.classList.remove('active');
    });
    const catKey = TAB_CATEGORIES[idx].key;

    const superItems  = unitDatabase.filter(u=>u.category===catKey && u.grade==="Super Hidden");
    const hiddenItems = unitDatabase.filter(u=>u.category===catKey && u.grade==="Hidden");
    const legendItems = unitDatabase.filter(u=>u.category===catKey && u.grade==="Legend");

    const combined = [...superItems, ...hiddenItems, ...legendItems];

    let h = '<div style="margin-top: 8px;">';
    
    combined.forEach((item) => {
        const nameColor = gradeColors[item.grade] || '#fff';
        
        h += `<div class="unit-list-card" onclick="selectUnitFromAction('${item.name}')">
            <div class="unit-list-name" style="color: ${nameColor};">
                ${gradeTag(item.grade)} ${item.name}
            </div>
            <div class="unit-list-recipe">${item.recipe||'-'}</div>
        </div>`;
    });
    h += '</div>';

    const contentArea = document.getElementById('tabContent');
    contentArea.innerHTML = h;
    contentArea.scrollTop = 0;
}

/* ========================================================================
   [ 빠른 검색 필터 UI 제어 ]
======================================================================== */
function renderQuickFilters(){
    const container=document.getElementById('quickGradeButtons');
    const targetGrades=["Magic","Rare","Epic","Unique","Hell","Legend","Hidden","Super Hidden"];
    let html='';
    targetGrades.forEach(g=>{
        html+=`<button class="grade-btn" style="border-left:4px solid ${gradeColors[g]};" onclick="showGradeUnits('${g}')">${g}</button>`;
    });
    container.innerHTML=html;
}

function showGradeUnits(grade){
    const units=unitDatabase.filter(u=>u.grade===grade)
        .sort((a,b)=>{
            if(a.category === b.category) return a.name.localeCompare(b.name);
            return a.category.localeCompare(b.category);
        });
    if(!units.length) return;
    
    let html=`<div class="analysis-card" style="border-color:${gradeColors[grade]}; background:var(--bg-panel); box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <h3 style="color:${gradeColors[grade]}; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border-light);">
            ${grade} Grade List <span style="font-size:0.8rem;color:var(--text-muted);font-weight:600;margin-left:6px;">(Click to view lineage)</span>
        </h3>
        <div style="display:flex;flex-direction:column;gap:6px;">`;
        
    units.forEach((u,idx)=>{
        html+=`<div style="display:flex;align-items:center;padding:12px 16px;border-radius:8px;border:1px solid var(--border-light);background:var(--bg-base);cursor:pointer;transition:.2s;"
            onmouseover="this.style.background='var(--bg-panel-hover)'" onmouseout="this.style.background='var(--bg-base)'"
            onclick="selectUnitFromAction('${u.name}')">
            <span style="color:var(--text-sub);width:40px;font-weight:bold;font-size:.95rem;">${gradeTag(grade)}</span>
            <span style="color:${gradeColors[grade]};font-weight:800;font-size:1rem;margin-left:8px;">${u.name}</span>
            <span style="margin-left:auto;color:var(--text-muted);font-size:.85rem;">${u.category}</span>
        </div>`;
    });
    html+=`</div></div>`;
    
    DOM.treeView.innerHTML = html;
    DOM.treeView.scrollTop = 0;
    
    resetMagicDashboard(true);
}

/* ========================================================================
   [ 대시보드 렌더링 ]
======================================================================== */
function renderDashboardAtoms(){
    dashboardAtoms.forEach(a=>{
        const d=document.createElement("div");
        d.className=`cost-slot ${a.class}`; d.id=`val-container-${a.name}`;
        d.innerHTML=`<div class="slot-val" id="val-${a.name}">0</div><div class="slot-name">${a.name}</div>`;
        DOM.magicDashboard.appendChild(d);
    });
}

function resetMagicDashboard(clearAll){
    dashboardAtoms.forEach(a=>{
        const container=document.getElementById(`val-container-${a.name}`);
        const e=document.getElementById(`val-${a.name}`);
        const nameEl=container.querySelector('.slot-name');
        if(e){e.innerHTML="0"; e.style.display="";}
        if(nameEl) nameEl.style.display="block";
        container.classList.remove('active');
    });
}

/* ========================================================================
   [ 메인 뷰 전환 로직 ]
======================================================================== */
function toggleMainView(){
    const btn = document.getElementById('btn-toggle-view');
    const searchBlock = document.getElementById('header-search-block');
    
    if(currentView===1){
        currentView=2;
        document.getElementById('view-combo').classList.remove('active');
        document.getElementById('view-essence').classList.add('active');
        btn.innerText='Switch to Hidden Combo';
        searchBlock.style.opacity = '0';
        setTimeout(() => searchBlock.style.display = 'none', 300);
    } else {
        currentView=1;
        document.getElementById('view-combo').classList.add('active');
        document.getElementById('view-essence').classList.remove('active');
        btn.innerText='Switch to Daily Essence';
        searchBlock.style.display = 'flex';
        setTimeout(() => searchBlock.style.opacity = '1', 10);
    }
}

function resetCombo(){
    DOM.comboInput.value=""; updateHighlight();
    DOM.treeView.innerHTML=""; 
    resetMagicDashboard(true);
}

/* ========================================================================
   [ 일일정수 UI 컨트롤 ]
======================================================================== */
const essenceClickState = {};
const essenceUnitsMap = {coral:[],aiur:[],zerus:[],hybrid:[]};
const essenceMax = {coral:0,aiur:0,zerus:0};

function initEssenceData(){
    essenceUnitsMap.coral=[]; essenceUnitsMap.aiur=[]; essenceUnitsMap.zerus=[]; essenceUnitsMap.hybrid=[];
    const catMapping={
        "T-Bio":"coral","T-Mech":"coral",
        "P-Bio":"aiur","P-Mech":"aiur",
        "Zerg/Neutral":"zerus","Hybrid":"hybrid"
    };
    unitDatabase.forEach(u=>{
        essenceClickState[u.name]=false;
        const group=catMapping[u.category];
        if(!group) return;
        if(!["Hidden","Super Hidden"].includes(u.grade)) return;
        essenceUnitsMap[group].push({name:u.name,category:u.category,grade:u.grade});
    });
    
    const ESSENCE_GRADE_ORDER = ["Super Hidden","Hidden"];
    Object.keys(essenceUnitsMap).forEach(g=>{
        essenceUnitsMap[g].sort((a,b)=>ESSENCE_GRADE_ORDER.indexOf(a.grade)-ESSENCE_GRADE_ORDER.indexOf(b.grade));
    });
    const hybridLen=essenceUnitsMap.hybrid.length;
    ["coral","aiur","zerus"].forEach(g=>{
        essenceMax[g]=essenceUnitsMap[g].length+hybridLen;
        document.getElementById(`max-${g}`).innerText=`/${essenceMax[g]}`;
    });
    renderEssenceGroups();
}

function renderEssenceGroups(){
    const container=document.getElementById('essenceGroupsContainer');
    const groupConfigs=[
        {id:'coral',title:'Korhal', text:'1 Combo +1 Essence', data:essenceUnitsMap.coral},
        {id:'aiur', title:'Aiur', text:'1 Combo +1 Essence', data:essenceUnitsMap.aiur},
        {id:'zerus',title:'Zerus', text:'1 Combo +1 Essence', data:essenceUnitsMap.zerus},
        {id:'hybrid',title:'Hybrid', text:'3 Combos +1 Essence', data:essenceUnitsMap.hybrid}
    ];
    let html='';
    const isMobile=window.innerWidth<=1200;
    groupConfigs.forEach(g=>{
        const displayStyle=isMobile?'none':'block';
        const icon=isMobile?'▼':'▲';
        html+=`<div class="essence-group">
            <div class="essence-group-header" onclick="toggleEssenceGroup('${g.id}')" style="cursor:pointer;">
                <h3 class="essence-group-title">${g.title} <span id="es-icon-${g.id}" style="font-size:.75rem;margin-left:6px;color:var(--text-muted);">${icon}</span></h3>
                <button class="btn-select-all" onclick="event.stopPropagation();toggleAllEssence('${g.id}')">Select All</button>
            </div>
            <div style="font-size:0.85rem; color:var(--accent); margin-bottom:12px; font-weight:700;">${g.text}</div>
            <div id="es-content-${g.id}" class="essence-content" style="display:${displayStyle};">`;
        
        ["Super Hidden","Hidden"].forEach(gradeGroup=>{
            const gradeUnits = g.data.filter(u=>u.grade===gradeGroup);
            if(!gradeUnits.length) return;
            const gradeLabelStyle = gradeGroup==="Super Hidden"
                ? `color:#ffd700;border-bottom-color:rgba(255,215,0,0.25);`
                : `color:var(--accent);border-bottom-color:rgba(56,189,248,0.2);`;
            const gradeIcon = gradeGroup==="Super Hidden" ? "[!]" : "[*]";
            html+=`<div class="es-grade-header" style="${gradeLabelStyle}">${gradeIcon} ${gradeGroup}</div>`;
            html+=`<div class="unit-check-list" style="margin-bottom:14px;">`;
            gradeUnits.forEach(uObj=>{
                const unitName=uObj.name;
                html+=`<div class="unit-check-btn" id="es-btn-${clean(unitName)}" onclick="toggleEssence('${unitName}')">
                    <span style="color:${getUnitColor(unitName)};font-weight:800;">${unitName}</span>
                    <span style="margin-left:auto;font-size:.8rem;color:${gradeColors[uObj.grade]||'var(--text-muted)'}">${uObj.category}</span>
                </div>`;
            });
            html+=`</div>`;
        });
        html+=`</div></div>`;
    });
    container.innerHTML=html;
    updateEssenceCalculation();
}

function toggleEssenceGroup(groupId){
    const content=document.getElementById(`es-content-${groupId}`);
    const icon=document.getElementById(`es-icon-${groupId}`);
    if(content.style.display==='none'){content.style.display='block';icon.innerText='▲';}
    else{content.style.display='none';icon.innerText='▼';}
}

function toggleAllEssence(groupId){
    const units=essenceUnitsMap[groupId];
    const allSelected=units.every(u=>essenceClickState[u.name]);
    const newState=!allSelected;
    units.forEach(u=>{
        essenceClickState[u.name]=newState;
        const btn=document.getElementById(`es-btn-${clean(u.name)}`);
        if(btn){if(newState) btn.classList.add('active'); else btn.classList.remove('active');}
    });
    updateEssenceCalculation();
    renderEssenceTree();
}

function toggleEssence(unitName){
    essenceClickState[unitName]=!essenceClickState[unitName];
    const btn=document.getElementById(`es-btn-${clean(unitName)}`);
    if(btn){if(essenceClickState[unitName]) btn.classList.add('active'); else btn.classList.remove('active');}
    updateEssenceCalculation();
    renderEssenceTree();
}

function resetAllEssence(){
    for(const key in essenceClickState){
        essenceClickState[key]=false;
        const btn=document.getElementById(`es-btn-${clean(key)}`);
        if(btn) btn.classList.remove('active');
    }
    updateEssenceCalculation();
    renderEssenceTree();
}

function updateEssenceCalculation(){
    let counts={coral:0,aiur:0,zerus:0,hybrid:0};
    essenceUnitsMap.coral.forEach(u=>{if(essenceClickState[u.name]) counts.coral++;});
    essenceUnitsMap.aiur.forEach(u=>{if(essenceClickState[u.name]) counts.aiur++;});
    essenceUnitsMap.zerus.forEach(u=>{if(essenceClickState[u.name]) counts.zerus++;});
    essenceUnitsMap.hybrid.forEach(u=>{if(essenceClickState[u.name]) counts.hybrid++;});
    const actual={
        coral: counts.coral+counts.hybrid,
        aiur:  counts.aiur +counts.hybrid,
        zerus: counts.zerus+counts.hybrid
    };
    document.getElementById('val-coral').innerText=actual.coral;
    document.getElementById('val-aiur').innerText=actual.aiur;
    document.getElementById('val-zerus').innerText=actual.zerus;
    document.getElementById('essence-total-val').innerText=actual.coral+actual.aiur+actual.zerus;
}

function renderEssenceTree(){
    const target = document.getElementById('essenceTreeView');
    const selectedKeys = [];
    
    for(const key in essenceClickState){
        if(essenceClickState[key]) selectedKeys.push(clean(key));
    }
    
    if(selectedKeys.length === 0){
        target.innerHTML = `<div style="color:var(--text-muted);text-align:center;margin-top:80px;font-size:1rem;font-weight:600;">If you click a unit on the left,<br>its entire lineage will be displayed.</div>`;
        return;
    }
    
    analyzeUnits(selectedKeys, {}, target);
    
    if(window.innerWidth<=1200) {
        target.scrollIntoView({behavior:'smooth'});
    }
}

/* ========================================================================
   [ 시스템 초기화 ]
======================================================================== */
function debounce(f,t){let timer; return(...args)=>{clearTimeout(timer);timer=setTimeout(()=>f.apply(this,args),t);};}

function init(){
    unitDatabase.forEach(u=>{ if(!u.key) u.key=clean(u.name); unitMap.set(u.key, u); });

    DOM.tablesContainer=document.getElementById("tablesContainer");
    DOM.magicDashboard=document.getElementById("magicDashboard");
    DOM.treeView=document.getElementById("treeView");
    DOM.comboInput=document.getElementById("comboInput");
    DOM.highlightLayer=document.getElementById("highlightLayer");

    DOM.comboInput.addEventListener("input",()=>{updateHighlight();debounceSearch();});
    DOM.comboInput.addEventListener("scroll",()=>{DOM.highlightLayer.scrollLeft=DOM.comboInput.scrollLeft;});

    renderDashboardAtoms();
    renderTabs();
    renderQuickFilters();
    initEssenceData();
}

window.onload=init;
</script>
